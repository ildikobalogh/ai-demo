<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrivo a Venezia - Lesson 1 Prototype</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .progress {
      font-size: 14px;
      color: #666;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .intro {
      text-align: center;
      padding: 40px 20px;
    }

    .intro h1 {
      margin-top: 0;
      font-size: 34px;
    }

    .intro p {
      font-size: 18px;
      color: #555;
    }

    .btn {
      border: none;
      background: #b22222;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn.secondary {
      background: #444;
    }

    .btn.light {
      background: #e9e9e9;
      color: #222;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-radius: 16px;
      background: #ddd;
    }

    .map-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(178, 34, 34, 0.95);
      color: white;
      border: 2px solid white;
      border-radius: 999px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      opacity: 0.55;
      z-index: 2;
    }

    .hotspot.locked {
      background: rgba(120,120,120,0.85);
      cursor: not-allowed;
      opacity: 0.35;
    }

    .hotspot.active {
      width: 28px;
      height: 28px;
      opacity: 1;
      background: rgba(178, 34, 34, 1);
      box-shadow: 0 0 10px rgba(178,34,34,0.7);
      z-index: 3;
    }

    .hotspot.inactive {
      opacity: 0.3;
    }

    .hotspot-label {
      position: absolute;
      transform: translate(-50%, 10px);
      background: rgba(255,255,255,0.95);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }

    .scene-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
    }

    .scene-image img {
      width: 100%;
      border-radius: 14px;
      display: block;
      object-fit: cover;
      max-height: 420px;
    }

    .scene-title {
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 8px;
    }

    .scene-text {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 18px;
      white-space: pre-line;
    }

    .question {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-size: 16px;
    }

    .option-btn:hover {
      background: #f7f7f7;
    }

    .feedback {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f1f1f1;
      display: none;
      white-space: pre-line;
      line-height: 1.5;
    }

    .feedback.show {
      display: block;
    }

    .debrief-list {
      line-height: 1.9;
      font-size: 18px;
    }

    .audio-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .small-note {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }

    .hint-word {
      color: #b22222;
      font-weight: bold;
      cursor: pointer;
      border-bottom: 1px dotted #b22222;
    }

    .hint-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.38);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .hint-overlay.show {
      display: flex;
    }

    .hint-box {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    .hint-box img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .instruction-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .inst {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: #333;
      background: #f6f6f6;
      padding: 8px 10px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }

    .icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .arrow {
      position: absolute;
      transform: translate(-50%, -100%);
      animation: bounce 1s infinite;
      pointer-events: none;
      color: #b22222;
      font-size: 64px;
      text-shadow:
        0 0 6px white,
        0 3px 8px rgba(0,0,0,0.5);
      z-index: 4;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, -100%); }
      50% { transform: translate(-50%, -120%); }
    }

    @media (max-width: 900px) {
      .scene-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Arrivo a Venezia</div>
      <div class="progress" id="progressText">Lezione 1</div>
    </div>

    <section class="screen active" id="introScreen">
      <div class="card intro">
        <h1>Arrivo a Venezia</h1>

        <p>
          Sei a Venezia.
          <span class="hint-word" data-help="listen">Ascolta</span>,
          <span class="hint-word" data-help="look">guarda</span>
          e
          <span class="hint-word" data-help="choose">scegli</span>.
        </p>

        <div id="hintOverlay" class="hint-overlay">
          <div id="hintBox" class="hint-box">
            <img id="hintImage" src="" alt="" />
            <p id="hintText"></p>
            <button type="button" onclick="closeHint()" class="btn light icon-btn">
              <img src="icons/close.png" alt="" class="btn-icon">
              Chiudi
            </button>
          </div>
        </div>

        <div class="btn-row" style="justify-content:center;">
          <button type="button" class="btn icon-btn" id="startBtn">
            <img src="icons/play.png" alt="" class="btn-icon">
            Inizia
          </button>
        </div>
      </div>
    </section>

    <section class="screen" id="mapScreen">
      <div class="card">
        <h2>Mappa di Venezia</h2>
        <p>Scegli il prossimo luogo.</p>
        <div class="map-wrap" id="mapWrap">
          <img id="mapImage" src="img/map_venice.png" alt="Mappa di Venezia" />
        </div>
      </div>
    </section>

    <section class="screen" id="sceneScreen">
      <div class="card">
        <div class="instruction-bar" id="instructionBar"></div>

        <div class="scene-layout">
          <div class="scene-image">
            <img id="sceneImage" src="" alt="" />
          </div>

          <div>
            <h2 class="scene-title" id="sceneTitle"></h2>
            <div class="scene-text" id="sceneText"></div>

            <div class="audio-row">
              <button type="button" class="btn light" id="playAudioBtn">Ascolta</button>
              <button type="button" class="btn light" id="replayAudioBtn">Riascolta</button>
            </div>

            <div class="question" id="questionText"></div>
            <div class="options" id="optionsWrap"></div>

            <div class="feedback" id="feedbackBox"></div>

            <div class="btn-row">
              <button type="button" class="btn secondary" id="backToMapBtn" style="display:none;">Torna alla mappa</button>
              <button type="button" class="btn" id="nextBtn" style="display:none;">Continua</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="debriefScreen">
      <div class="card">
        <h2>Fine della lezione 1</h2>
        <p>Ora puoi:</p>
        <div class="debrief-list">
          chiedere una chiave<br>
          capire un numero<br>
          riconoscere alcune parole utili<br>
          muoverti a Venezia in situazioni semplici
        </div>
        <div class="btn-row">
          <button type="button" class="btn" id="restartBtn">Ricomincia</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const ASSETS = {
      map: "img/map_venice.png",
      fallbackImage: "img/map_venice.png"
    };

    const hintData = {
      listen: {
        image: "icons/listen.png",
        text: "Ascolta = senti il suono"
      },
      look: {
        image: "icons/look.png",
        text: "Guarda = osserva l'immagine"
      },
      choose: {
        image: "icons/choose.png",
        text: "Scegli = fai una scelta"
      }
    };

    const scenes = [
      {
        id: "stazione",
        label: "Stazione Santa Lucia",
        x: 8,
        y: 55,
        unlocked: true,
        instructions: ["look", "choose"],
        title: "Stazione Santa Lucia",
        text: "Arrivi a Venezia.\nVedi una freccia rossa con la parola: inizio.",
        image: "img/stazione.png",
        audio: "",
        question: "Cosa significa “inizio”?",
        options: [
          { text: "uscita", correct: false, feedback: "Non ancora.\nQui il viaggio comincia." },
          { text: "inizio", correct: true, feedback: "Sì.\nQui inizia il percorso." },
          { text: "hotel", correct: false, feedback: "Non qui.\nPrima devi cominciare il percorso." }
        ],
        next: "rialto"
      },
      {
        id: "rialto",
        label: "Ponte di Rialto",
        x: 38,
        y: 52,
        unlocked: false,
        instructions: ["listen", "choose"],
        title: "Ponte di Rialto",
        text: "Sei vicino al Ponte di Rialto.\nAscolta e scegli la parola giusta.",
        image: "img/rialto.png",
        audio: "",
        question: "Quale parola senti?",
        options: [
          { text: "ponte", correct: true, feedback: "Esatto.\nPonte = bridge." },
          { text: "piazza", correct: false, feedback: "No.\nQui sei su un ponte." },
          { text: "camera", correct: false, feedback: "No.\nNon sei ancora in hotel." }
        ],
        next: "sanmarco"
      },
      {
        id: "sanmarco",
        label: "Piazza San Marco",
        x: 72,
        y: 60,
        unlocked: false,
        instructions: ["look", "choose"],
        title: "Piazza San Marco",
        text: "Ora sei in Piazza San Marco.\nGuardi i monumenti principali.",
        image: "img/san_marco.png",
        audio: "",
        question: "Quale parola indica la piazza?",
        options: [
          { text: "basilica", correct: false, feedback: "No.\nLa basilica è l'edificio religioso." },
          { text: "campanile", correct: false, feedback: "No.\nIl campanile è la torre." },
          { text: "piazza", correct: true, feedback: "Sì.\nPiazza San Marco." }
        ],
        next: "hotel"
      },
      {
        id: "hotel",
        label: "Albergo",
        x: 66,
        y: 48,
        unlocked: false,
        instructions: ["listen", "choose"],
        title: "Alla ricezione",
        text: "Sei in albergo.\nLa receptionist ti guarda e aspetta.",
        image: "img/ricezione.png",
        audio: "",
        question: "Cosa dici?",
        options: [
          { text: "La chiave, per favore.", correct: true, feedback: "Perfetto.\n- Quale camera?\n- La camera 451.\n- Ecco.\n- Grazie.\n- Prego." },
          { text: "Il tavolo, per favore.", correct: false, feedback: "No.\nAlla ricezione chiedi la chiave." },
          { text: "La lampada, per favore.", correct: false, feedback: "No.\nLa lampada è nella camera, non alla ricezione." }
        ],
        next: "camera1"
      },
      {
        id: "camera1",
        label: "Camera",
        x: 58,
        y: 40,
        unlocked: false,
        instructions: ["look", "choose"],
        title: "La camera 451",
        text: "Entri nella camera.\nGuarda.",
        image: "img/camera.png",
        audio: "",
        question: "Cos'è?",
        options: [
          { text: "il letto", correct: true, feedback: "Sì.\nÈ il letto." },
          { text: "la lampada", correct: false, feedback: "No.\nNon è la lampada." },
          { text: "il tavolo", correct: false, feedback: "No.\nNon è il tavolo." }
        ],
        next: "camera2"
      },
      {
        id: "camera2",
        label: "Lampada",
        x: 60,
        y: 42,
        unlocked: false,
        instructions: ["look", "choose"],
        title: "Nella camera",
        text: "Guarda ancora l'immagine.",
        image: "img/camera.png",
        audio: "",
        question: "Dov'è la lampada?",
        options: [
          { text: "a sinistra", correct: false, feedback: "No.\nNon è a sinistra." },
          { text: "a destra", correct: true, feedback: "Sì.\nLa lampada è a destra." },
          { text: "vicino alla porta", correct: false, feedback: "No.\nNon è vicino alla porta." }
        ],
        next: "camera3"
      },
      {
        id: "camera3",
        label: "Oggetti",
        x: 62,
        y: 44,
        unlocked: false,
        instructions: ["look", "choose"],
        title: "Nella camera",
        text: "Ora scegli la risposta corretta.",
        image: "img/camera.png",
        audio: "",
        question: "Cosa vedi nella camera?",
        options: [
          { text: "il letto, la lampada e il tavolo", correct: true, feedback: "Benissimo.\nVedi il letto, la lampada e il tavolo." },
          { text: "il vaporetto, la piazza e il campanile", correct: false, feedback: "No.\nQuesti non sono nella camera." },
          { text: "la basilica, il ponte e l'albergo", correct: false, feedback: "No.\nQuesti luoghi non sono nella camera." }
        ],
        next: "vaporetto"
      },
      {
        id: "vaporetto",
        label: "San Zaccaria",
        x: 78,
        y: 54,
        unlocked: false,
        instructions: ["listen", "choose"],
        title: "Fermata del vaporetto",
        text: "Vai alla fermata del vaporetto.\nDevi capire un numero semplice.",
        image: "img/fermata.png",
        audio: "",
        question: "Quale numero senti?",
        options: [
          { text: "tre", correct: true, feedback: "Giusto.\nHai capito il numero." },
          { text: "dieci", correct: false, feedback: "Non esatto.\nRiascolta, se vuoi." },
          { text: "otto", correct: false, feedback: "Non esatto.\nRiascolta, se vuoi." }
        ],
        next: "sospiri"
      },
      {
        id: "sospiri",
        label: "Ponte dei Sospiri",
        x: 75,
        y: 64,
        unlocked: false,
        instructions: ["look", "choose"],
        title: "Ponte dei Sospiri",
        text: "Hai finito il percorso.\nOra sai usare alcune parole utili a Venezia.",
        image: "img/sospiri.png",
        audio: "",
        question: "Vuoi finire la lezione?",
        options: [
          { text: "Sì, continua", correct: true, feedback: "Benissimo.\nPassi al riepilogo finale." }
        ],
        next: "debrief"
      }
    ];

    const screens = {
      intro: document.getElementById("introScreen"),
      map: document.getElementById("mapScreen"),
      scene: document.getElementById("sceneScreen"),
      debrief: document.getElementById("debriefScreen")
    };

    const mapWrap = document.getElementById("mapWrap");
    const mapImage = document.getElementById("mapImage");
    const progressText = document.getElementById("progressText");

    const sceneTitle = document.getElementById("sceneTitle");
    const sceneText = document.getElementById("sceneText");
    const sceneImage = document.getElementById("sceneImage");
    const questionText = document.getElementById("questionText");
    const optionsWrap = document.getElementById("optionsWrap");
    const feedbackBox = document.getElementById("feedbackBox");

    const playAudioBtn = document.getElementById("playAudioBtn");
    const replayAudioBtn = document.getElementById("replayAudioBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backToMapBtn = document.getElementById("backToMapBtn");

    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    const hintOverlay = document.getElementById("hintOverlay");
    const hintImage = document.getElementById("hintImage");
    const hintText = document.getElementById("hintText");

    let currentSceneId = null;
    let currentAudio = null;
    let completedCount = 0;

    function closeHint() {
      hintOverlay.classList.remove("show");
    }

    function showHint(key) {
      if (!hintData[key]) return;
      hintImage.src = hintData[key].image;
      hintText.textContent = hintData[key].text;
      hintOverlay.classList.add("show");
    }

    function renderInstructionBar(instructions) {
      const instructionBar = document.getElementById("instructionBar");
      instructionBar.innerHTML = "";

      instructions.forEach(key => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "inst";

        let label = "";
        if (key === "listen") label = "Ascolta";
        if (key === "look") label = "Guarda";
        if (key === "choose") label = "Scegli";

        item.innerHTML = `<img src="${hintData[key].image}" class="icon" alt=""> ${label}`;
        item.addEventListener("click", () => showHint(key));
        instructionBar.appendChild(item);
      });
    }

    document.querySelectorAll(".hint-word").forEach(word => {
      word.addEventListener("click", () => {
        showHint(word.dataset.help);
      });
    });

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
    }

    function updateProgress() {
      progressText.textContent = `Lezione 1 · completati: ${completedCount}/${scenes.length - 1}`;
    }

    function renderMap() {
      mapImage.src = ASSETS.map || ASSETS.fallbackImage;

      mapWrap.querySelectorAll(".hotspot, .hotspot-label, .arrow").forEach(el => el.remove());

      const mapScenes = scenes.filter(scene => !scene.id.startsWith("camera"));
      const activeScene = mapScenes.find(scene => scene.unlocked && !scene.completedOnce);

      mapScenes.forEach(scene => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.style.left = `${scene.x}%`;
        btn.style.top = `${scene.y}%`;
        btn.title = scene.label;

        if (activeScene && scene.id === activeScene.id) {
          btn.className = "hotspot active";
          btn.addEventListener("click", () => openScene(scene.id));

          const arrow = document.createElement("div");
          arrow.className = "arrow";
          arrow.style.left = `${scene.x}%`;
          arrow.style.top = `${scene.y}%`;
          arrow.innerHTML = "▼";
          mapWrap.appendChild(arrow);
        } else if (scene.unlocked) {
          btn.className = "hotspot";
          btn.addEventListener("click", () => openScene(scene.id));
        } else {
          btn.className = "hotspot locked inactive";
          btn.addEventListener("click", () => {
            alert("Questo luogo è ancora bloccato.");
          });
        }

        mapWrap.appendChild(btn);
      });

      updateProgress();
    }

    function openScene(sceneId) {
      currentSceneId = sceneId;
      const scene = scenes.find(s => s.id === sceneId);
      if (!scene) return;

      renderInstructionBar(scene.instructions || []);

      sceneTitle.textContent = scene.title;
      sceneText.textContent = scene.text;
      sceneImage.src = scene.image || ASSETS.fallbackImage;
      questionText.textContent = scene.question;
      feedbackBox.classList.remove("show");
      feedbackBox.textContent = "";
      nextBtn.style.display = "none";
      backToMapBtn.style.display = "none";

      optionsWrap.innerHTML = "";
      scene.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option.text;
        btn.type = "button";
        btn.addEventListener("click", () => handleAnswer(scene, option));
        optionsWrap.appendChild(btn);
      });

      setupAudio(scene.audio);
      showScreen("scene");
    }

    function setupAudio(audioUrl) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      if (audioUrl) {
        currentAudio = new Audio(audioUrl);
        playAudioBtn.disabled = false;
        replayAudioBtn.disabled = false;
      } else {
        playAudioBtn.disabled = true;
        replayAudioBtn.disabled = true;
      }
    }

    function handleAnswer(scene, option) {
      feedbackBox.textContent = option.feedback;
      feedbackBox.classList.add("show");

      if (!option.correct) {
        nextBtn.style.display = "none";
        backToMapBtn.style.display = "inline-block";

        backToMapBtn.onclick = () => {
          renderMap();
          showScreen("map");
        };
        return;
      }

      const isDebriefJump = scene.next === "debrief";
      const nextScene = scenes.find(s => s.id === scene.next);

      if (nextScene) {
        nextScene.unlocked = true;
      }

      if (!scene.completedOnce) {
        scene.completedOnce = true;
        if (scene.id !== "sospiri") {
          completedCount++;
        }
      }

      if (isDebriefJump) {
        nextBtn.style.display = "inline-block";
        backToMapBtn.style.display = "none";
        nextBtn.onclick = () => showScreen("debrief");
      } else {
        nextBtn.style.display = "inline-block";
        backToMapBtn.style.display = "inline-block";

        nextBtn.onclick = () => {
          if (nextScene && nextScene.id.startsWith("camera")) {
            openScene(nextScene.id);
          } else {
            renderMap();
            showScreen("map");
          }
        };

        backToMapBtn.onclick = () => {
          renderMap();
          showScreen("map");
        };
      }

      updateProgress();
    }

    playAudioBtn.addEventListener("click", () => {
      if (currentAudio) currentAudio.play();
    });

    replayAudioBtn.addEventListener("click", () => {
      if (currentAudio) {
        currentAudio.currentTime = 0;
        currentAudio.play();
      }
    });

    startBtn.addEventListener("click", () => {
      renderMap();
      showScreen("map");
    });

    restartBtn.addEventListener("click", () => {
      scenes.forEach((scene, index) => {
        scene.unlocked = index === 0;
        scene.completedOnce = false;
      });

      completedCount = 0;
      currentSceneId = null;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      renderMap();
      showScreen("intro");
      closeHint();
      updateProgress();
    });

    renderMap();
    updateProgress();
  </script>
</body>
</html>
