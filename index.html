<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scenario Demo - Kickoff Meeting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }

    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 20px; margin-top: 32px; margin-bottom: 12px; }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      background: #fafafa;
    }

    .scenario-text { margin-bottom: 20px; white-space: pre-line; }

    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin: 10px 0;
      padding: 14px 16px;
      border: 1px solid #bbb;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 16px;
    }
    .option-btn:hover { background: #f2f2f2; }

    .feedback {
      margin-top: 24px;
      padding: 16px;
      border-left: 4px solid #666;
      background: #f5f5f5;
      border-radius: 6px;
      display: none;
      white-space: pre-line;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .secondary-btn {
      padding: 10px 16px;
      border: 1px solid #888;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 15px;
    }
    .secondary-btn:hover { background: #f2f2f2; }

    .meta { color: #666; font-size: 15px; margin-top: 0; }

    .help-title { margin-top: 28px; margin-bottom: 8px; font-weight: bold; }

    .help-box {
      margin-top: 14px;
      padding: 16px;
      border-left: 4px solid #2d6a4f;
      background: #f1f8f4;
      border-radius: 6px;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>Scenario-Based Learning Demo</h1>
  <p class="meta">Project sample: improving client preparation before and after kickoff meetings</p>

  <div class="card">
    <h2>Scenario 1</h2>

    <div class="scenario-text" id="scenarioText"></div>

    <h2>Decision</h2>
    <p id="decisionText"></p>

    <div id="optionsContainer"></div>

    <div class="feedback" id="feedbackBox"></div>

    <div class="help-title">Need help?</div>

    <div class="controls">
      <button class="secondary-btn" onclick="showSOP()">SOP</button>
      <button class="secondary-btn" onclick="showJobAid()">Job Aid</button>
      <button class="secondary-btn" onclick="showAICoach()">AI Coach</button>
    </div>

    <div class="help-box" id="helpBox"></div>

    <div class="controls">
      <button class="secondary-btn" onclick="resetScenario()">Try again</button>
    </div>
  </div>

  <script>
    const scenario = {
      title: "Scenario 1",
      text:
`You’re preparing for a kickoff meeting with a new SME client.

You send the project documentation in advance.

A few minutes later, the client replies:
“Thanks, I’ll take a look before the meeting.”

You’ve seen this before. Many clients say this but arrive unprepared.`,
      decision: "What do you write in your follow-up email?",
      options: [
        {
          label: "A",
          text: "Before our next meeting, please review the summary (pages 2–3) and send one key question or comment. We’ll use this to define the next steps together.",
          consequence:
`Before the meeting, the client writes:
“I have a question about how the testing phase fits into our workflow.”

At the meeting:
“So based on page 3, I think we need to focus on implementation timing. Is that correct?”`
        },
        {
          label: "B",
          text: "Before our next meeting, please review pages 2–3. We’ll build on this during our discussion.",
          consequence:
`Before the meeting, the client replies:
“I reviewed the summary. I think the focus is on testing the solution in our workflow.”

At the meeting:
“From what I understood, the goal is to test the solution and then move to implementation, right?”

When you ask about details, they hesitate:
“I’m not sure how the timeline fits into this part.”`
        },
        {
          label: "C",
          text: "Please review the summary before our next meeting and come prepared with your thoughts.",
          consequence:
`Before the meeting, the client replies:
“Thanks, looks good.”

At the meeting:
“Yes, I looked at it.”

“I think I understand the general idea, but I’m not sure how the steps connect.”`
        },
        {
          label: "D",
          text: "Thank you for the meeting. I’ll send a summary shortly so we can continue next time.",
          consequence:
`No response before the meeting.

At the next meeting:
“Could you quickly go over what we agreed on last time?”`
        }
      ]
    };

    const scenarioText = document.getElementById("scenarioText");
    const decisionText = document.getElementById("decisionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackBox = document.getElementById("feedbackBox");
    const helpBox = document.getElementById("helpBox");

    function renderScenario() {
      scenarioText.textContent = scenario.text;
      decisionText.textContent = scenario.decision;
      optionsContainer.innerHTML = "";
      feedbackBox.style.display = "none";
      feedbackBox.textContent = "";
      helpBox.style.display = "none";
      helpBox.textContent = "";

      scenario.options.forEach((option) => {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.innerHTML = "<strong>" + option.label + "</strong> " + option.text;
        button.onclick = () => showConsequence(option);
        optionsContainer.appendChild(button);
      });
    }

    function showConsequence(option) {
      feedbackBox.style.display = "block";
      feedbackBox.textContent = option.consequence;
    }

    function showSOP() {
      helpBox.style.display = "block";
      helpBox.textContent =
`SOP: Pre-meeting communication process

1. Send the project document in advance.
2. Specify which sections to review.
3. Require one concrete question or comment.
4. Frame the meeting as a discussion.
5. Use the client’s response to guide next steps.`;
    }

    function showJobAid() {
      helpBox.style.display = "block";
      helpBox.textContent =
`Job Aid: Quick checklist

- Tell the client what to read
- Ask for one specific response
- Set expectation for discussion
- Avoid re-explaining everything
- Use their input to move forward`;
    }

    function showAICoach() {
      helpBox.style.display = "block";
      helpBox.textContent =
`AI Coach (simulated)

Strong messages usually:
- narrow the reading task
- require a visible response
- define the purpose of the meeting

If the client can prepare passively, they often will.`;
    }

    function resetScenario() {
      renderScenario();
    }

    renderScenario();
  </script>
</body>
</html>
